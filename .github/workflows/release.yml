# Release Windows installer on version tag
# @author prompt-vault team
# @date 2026-07-07

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Use official Electron mirrors on CI
        shell: bash
        run: |
          if [ -f .npmrc ]; then
            grep -v 'electron_mirror\|electron_builder_binaries_mirror' .npmrc > .npmrc.ci || true
            mv .npmrc.ci .npmrc
          fi

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec electron --version

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - run: pnpm test
      - run: pnpm electron:build

      - name: List release artifacts
        shell: bash
        run: ls -lh release/ || true

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*-windows.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
