# Release desktop installers on version tag (Windows / macOS / Linux)
# @author prompt-vault team
# @date 2026-07-07

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Use official Electron mirrors on CI
        shell: bash
        run: |
          if [ -f .npmrc ]; then
            grep -v 'electron_mirror\|electron_builder_binaries_mirror' .npmrc > .npmrc.ci || true
            mv .npmrc.ci .npmrc
          fi

      - name: Disable Electron sandbox on Linux CI
        shell: bash
        run: echo "ELECTRON_DISABLE_SANDBOX=1" >> "$GITHUB_ENV"

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec electron --version

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION"
            exit 1
          fi

      - run: pnpm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-script: electron:build:win
            artifact: release/*-windows.exe
          - os: macos-latest
            build-script: electron:build:mac
            artifact: release/*-macos.dmg
          - os: ubuntu-latest
            build-script: electron:build:linux
            artifact: release/*-linux.AppImage

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Use official Electron mirrors on CI
        shell: bash
        run: |
          if [ -f .npmrc ]; then
            grep -v 'electron_mirror\|electron_builder_binaries_mirror' .npmrc > .npmrc.ci || true
            mv .npmrc.ci .npmrc
          fi

      - name: Configure Linux build environment
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo "ELECTRON_DISABLE_SANDBOX=1" >> "$GITHUB_ENV"
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec electron --version
      - run: pnpm run ${{ matrix.build-script }}

      - name: List release artifacts
        shell: bash
        run: ls -lh release/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: find artifacts -type f -exec ls -lh {} \;

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false
